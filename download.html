<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon — Local Music Party</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        .coming-soon-card {
            background: rgba(22, 22, 28, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(167, 139, 250, 0.2);
            padding: 60px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(255, 138, 122, 0.1);
            color: var(--accent-coral);
            border-radius: 100px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .launch-date {
            color: var(--accent-purple);
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 40px;
        }

        .social-group {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-group p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .btn-back {
            margin-top: 20px;
            display: inline-block;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .btn-back:hover {
            color: white;
        }

        /* Анимация пульсации для акцента */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="coming-soon-card" data-aos="zoom-in">
        <div class="status-badge pulse">В разработке</div>
        
        <h1 class="display-headline" style="font-size: 32px; margin-bottom: 16px;">
            Приложение еще в разработке :(
        </h1>
        
        <p class="launch-date">Запуск 20 июня 2026</p>

        <div class="social-group">
            <p>Для связи с нами:</p>
            <div class="d-flex justify-content-center gap-2">
                <a href="#" class="social-link"><i class="fab fa-telegram-plane"></i></a>
                <a href="#" class="social-link"><i class="fab fa-vk"></i></a>
                <a href="#" class="social-link"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>

        <a href="index.html" class="btn-back">
            <i class="fas fa-arrow-left me-2"></i> Вернуться на сайт
        </a>
    </div>

</body>
</html>
